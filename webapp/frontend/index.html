// Cache API per evitare chiamate ripetute
const _apiCache={};
const CACHE_TTL=300000; // 5 minuti

async function fetchAPI(ep, noCache) {
  // Usa cache se disponibile e non scaduta
  if(!noCache && _apiCache[ep] && (Date.now()-_apiCache[ep].t < CACHE_TTL)){
    return _apiCache[ep].d;
  }
  try {
    const sep = ep.includes("?") ? "&" : "?";
    const headers = {};
    if(userToken) headers["Authorization"] = "Bearer " + userToken;
    const r = await fetch(API+ep+sep+"_t="+Date.now(), {headers});
    if(!r.ok) throw new Error(r.status);
    const data = await r.json();
    _apiCache[ep]={d:data,t:Date.now()};
    return data;
  } catch(e) { console.error("API:",ep,e); return null; }
}

async function postAPI(ep, body) {
  try {
    const headers = {"Content-Type":"application/json"};
    if(userToken) headers["Authorization"] = "Bearer " + userToken;
    const r = await fetch(API+ep, {method:"POST", headers, body:JSON.stringify(body)});
    if(!r.ok) { const err = await r.json().catch(()=>({})); throw new Error(err.detail||r.status); }
    return await r.json();
  } catch(e) { throw e; }
}

// Carica partite di oggi nella home
async function loadPartiteOggi(){
  const el=$("partite-oggi-home");
  if(!el)return;
  try{
    const cal=await fetchAPI("/api/calendario");
    if(!cal||!cal.giornate)return;
    const gc=cal.giornata_corrente;
    const g=cal.giornate.find(x=>x.giornata===gc);
    if(!g||!g.partite)return;
    const hasResults=g.partite.some(p=>p.gol_h!==null&&p.gol_h!==undefined);
    if(!hasResults&&!g.live)return;
    let html=`<div class="card" style="border-color:${g.live?'#e74c3c':'var(--accent)'}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>Giornata ${gc}</h2>${g.live?'<span style="background:#e74c3c;color:#fff;padding:4px 12px;border-radius:10px;font-size:.75rem;font-weight:700;animation:pulse 1.5s infinite">LIVE</span>':''}</div>`;
    g.partite.forEach(p=>{
      if(p.gol_h!==null&&p.gol_h!==undefined){
        const cH=p.gol_h>p.gol_a?"var(--green)":p.gol_h<p.gol_a?"var(--red)":"var(--yellow)";
        const cA=p.gol_a>p.gol_h?"var(--green)":p.gol_a<p.gol_h?"var(--red)":"var(--yellow)";
        let st=p.status==="FT"?"FT":p.live?(p.minuto+"'"):(p.status==="HT"?"INT":(p.ora||""));
        html+=`<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #1f3460"><span style="flex:1;text-align:right;font-size:.9rem;font-weight:700">${badge(p.home,16)}${p.home}</span><div style="min-width:70px;text-align:center"><span style="font-weight:800;font-size:1.1rem"><span style="color:${cH}">${p.gol_h}</span>-<span style="color:${cA}">${p.gol_a}</span></span><div style="font-size:.65rem;color:var(--muted)">${st}</div></div><span style="flex:1;font-size:.9rem;font-weight:700">${p.away}${badge(p.away,16)}</span></div>`;
      } else {
        html+=`<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #1f3460"><span style="flex:1;text-align:right;font-size:.85rem">${badge(p.home,16)}${p.home}</span><span style="min-width:70px;text-align:center;color:var(--muted);font-size:.8rem">${p.ora||"vs"}</span><span style="flex:1;font-size:.85rem">${p.away}${badge(p.away,16)}</span></div>`;
      }
    });
    html+=`</div>`;
    el.innerHTML=html;
  }catch(e){}
}

// Carica schedina nella home (con timeout per non bloccare)
async function loadSchedina(){
  const el=$("schedina-home");
  if(!el)return;
  try{
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 8000);
    const headers = {};
    if(userToken) headers["Authorization"] = "Bearer " + userToken;
    const r = await fetch(API+"/api/schedina?_t="+Date.now(), {headers, signal:controller.signal});
    clearTimeout(timeoutId);
    if(!r.ok) return;
    const d = await r.json();
    if(!d||!d.giocate||!d.giocate.length)return;
  let html='<div class="card" style="border-color:var(--green);border-width:2px"><h2 style="color:var(--green);text-align:center">Schedina del Giorno  -  G.'+d.giornata+'</h2><p style="text-align:center;color:var(--muted);margin-bottom:16px">'+d.tipo+'</p>';
  const maxShow = userPlan==="pro" ? d.giocate.length : 2;
  d.giocate.slice(0,maxShow).forEach((g,i)=>{
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1f3460"><div><strong>${g.home}</strong> vs <strong>${g.away}</strong><br><span style="color:var(--muted);font-size:.8rem">Conf. ${Math.round(g.confidence*100)}% | ${g.over_under} | ${g.goal}</span></div><div style="text-align:right"><span class="tag tag-green" style="font-size:1rem;padding:6px 16px">${g.tip}</span><br><span style="color:var(--muted);font-size:.85rem">Quota ${g.quota}</span></div></div>`;
  });
  if(userPlan!=="pro"&&d.giocate.length>2){
    html+=`<div style="text-align:center;padding:16px;color:var(--muted)"><p>+ ${d.giocate.length-2} altre giocate SICURE</p><button class="btn btn-green" style="margin-top:8px" onclick="abbonarPro()">Sblocca tutto con Pro  -  9.99&euro;/mese</button></div>`;
  }
  if(userPlan==="pro"){
    html+=`<div style="text-align:center;margin-top:16px;padding:16px;background:#0d1b2a;border-radius:8px"><span style="color:var(--muted)">Quota totale schedina:</span><br><span style="font-size:2rem;font-weight:800;color:var(--green)">${d.quota_totale}</span></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
  }catch(e){/* schedina timeout/errore - non blocca la home */}
}

async function calcPronostico(){
  const h=$("sel-home").value, a=$("sel-away").value, res=$("result");
  if(h===a){res.innerHTML='<div class="card" style="color:var(--red)">Scegli due squadre diverse!</div>';return}
  // Limite Free
  if(userPlan!=="pro" && freeUsed>=FREE_LIMIT){
    res.innerHTML='<div class="card" style="text-align:center;padding:32px"><h2 style="color:var(--yellow)">Hai usato i tuoi 2 pronostici gratuiti!</h2><p style="color:var(--muted);margin:16px 0">Passa a Pro per pronostici illimitati, Over/Under, Goal, Risultato Esatto e molto altro.</p><button class="btn btn-green" style="font-size:1.1rem;padding:14px 40px" onclick="abbonarPro()">Abbonati a Pro  -  9.99&euro;/mese</button></div>';
    return;
  }
  res.innerHTML='<div class="spinner"></div>';
  const d=await fetchAPI("/api"+leagueApiPrefix()+"/pronostico/"+encodeURIComponent(h)+"/"+encodeURIComponent(a));
  if(!d){res.innerHTML='<div class="card" style="color:var(--red)">Errore. Riprova tra qualche secondo.</div>';return}
  const best=d.suggerimento||"?";
  const cc=d.confidence_label==="Alta"?"var(--green)":d.confidence_label==="Media"?"var(--yellow)":"var(--red)";
  const cp=Math.round((d.confidence||0.5)*100);
  let extra="";
  if(d.over_25){
    const ouVal=Math.max(d.over_25,d.under_25);
    const ouLbl=d.over_25>50?"Over 2.5":"Under 2.5";
    const ouCol=ouVal>60?"var(--green)":ouVal>55?"#8bc34a":"var(--accent)";
    const glVal=Math.max(d.goal_si,d.goal_no);
    const glLbl=d.goal_si>50?"Goal Si":"Goal No";
    const glCol=glVal>60?"var(--green)":glVal>55?"#8bc34a":"var(--accent)";
    extra=`<div class="grid3" style="margin:16px 0">
      <div class="card" style="text-align:center;padding:12px"><strong>${ouLbl}</strong><br><span style="font-size:1.3rem;font-weight:700;color:${ouCol}">${ouVal}%</span></div>
      <div class="card" style="text-align:center;padding:12px"><strong>${glLbl}</strong><br><span style="font-size:1.3rem;font-weight:700;color:${glCol}">${glVal}%</span></div>
      <div class="card" style="text-align:center;padding:12px"><strong>Gol Attesi</strong><br><span style="font-size:1.3rem;font-weight:700;color:${d.gol_attesi>2.5?'var(--green)':'var(--accent)'}">${d.gol_attesi||"-"}</span></div>
    </div>`;
    // Risultato esatto ben visibile
    if(d.risultati_esatti&&d.risultati_esatti.length){
      extra+=`<div style="margin-top:16px"><h4 style="color:var(--accent);margin-bottom:8px">Risultato Esatto Piu' Probabile</h4><div class="grid3" style="gap:8px">`;
      d.risultati_esatti.slice(0,3).forEach((r,i)=>{
        const bg=i===0?"var(--green)":i===1?"var(--accent)":"var(--muted)";
        extra+=`<div style="text-align:center;padding:12px;background:#0d1b2a;border-radius:10px;border:2px solid ${bg}"><div style="font-size:1.8rem;font-weight:800;color:${bg}">${r.score}</div><div style="color:var(--muted);font-size:.85rem">${r.prob}%</div></div>`;
      });
      extra+=`</div>`;
      if(d.risultati_esatti.length>3){
        extra+=`<div style="display:flex;gap:8px;margin-top:6px;justify-content:center">`;
        d.risultati_esatti.slice(3,5).forEach(r=>{
          extra+=`<span style="color:var(--muted);font-size:.85rem">${r.score} (${r.prob}%)</span>`;
        });
        extra+=`</div>`;
      }
      extra+=`</div>`;
    }
    // GIOCATA MIGLIORE consigliata dall'IA
    const ouTip=d.over_25>50?"Over 2.5":"Under 2.5";
    const ouProb=Math.max(d.over_25,d.under_25);
    const glTip=d.goal_si>50?"Goal Si":"Goal No";
    const glProb=Math.max(d.goal_si,d.goal_no);
    // Trova la giocata con probabilita' piu' alta
    const giocate=[
      {nome:`1X2: ${best}`,prob:Math.max(d.prob_1,d.prob_x,d.prob_2),quota:best==="1"?d.quota_1:best==="X"?d.quota_x:d.quota_2},
      {nome:ouTip,prob:ouProb,quota:ouProb>55?1.85:2.10},
      {nome:glTip,prob:glProb,quota:glProb>55?1.75:2.00},
    ];
    giocate.sort((a,b)=>b.prob-a.prob);
    extra+=`<div style="margin-top:16px;padding:16px;background:linear-gradient(135deg,#0d3b1e,#162447);border-radius:12px;border:2px solid var(--green)">
      <h4 style="color:var(--green);margin-bottom:8px;text-align:center">Giocata Migliore Consigliata dall'IA</h4>
      <div style="text-align:center"><span style="font-size:1.5rem;font-weight:800;color:var(--green)">${giocate[0].nome}</span><br><span style="color:var(--muted)">Probabilita': ${giocate[0].prob}% | Quota ~${giocate[0].quota}</span></div>
      <div style="display:flex;justify-content:center;gap:12px;margin-top:8px">
        ${giocate.slice(1).map(g=>`<span style="color:var(--muted);font-size:.85rem">${g.nome}: ${g.prob}%</span>`).join(" | ")}
      </div>
    </div>`;
    // Marcatori consigliati
    if(d.marcatori_casa||d.marcatori_ospite){
      extra+=`<div style="margin-top:12px;padding:12px;background:#0d1b2a;border-radius:8px"><h4 style="color:var(--green);margin-bottom:8px">Probabili Marcatori</h4>`;
      if(d.marcatori_casa&&d.marcatori_casa.length)extra+=`<p style="color:var(--text);font-size:.9rem"><strong style="color:var(--green)">${h}:</strong> ${d.marcatori_casa.join(" &middot; ")}</p>`;
      if(d.marcatori_ospite&&d.marcatori_ospite.length)extra+=`<p style="color:var(--text);font-size:.9rem;margin-top:4px"><strong style="color:var(--red)">${a}:</strong> ${d.marcatori_ospite.join(" &middot; ")}</p>`;
      extra+=`</div>`;
    }
    // Formazioni con campo
    if(d.formazione_casa||d.formazione_ospite){
      extra+=`<div style="margin-top:12px;padding:16px;background:#0d1b2a;border-radius:8px"><h4 style="color:var(--accent);margin-bottom:12px">Probabili Formazioni</h4>`;
      [["casa",h,d.formazione_casa,"var(--green)"],[" ospite",a,d.formazione_ospite,"var(--red)"]].forEach(([tipo,nome,form,col])=>{
        if(form){
          extra+=`<div style="margin-bottom:12px"><strong style="color:${col};font-size:1rem">${nome} (${form.modulo})</strong><div style="background:#2d8a4e;border-radius:8px;padding:12px;margin-top:6px;text-align:center">`;
          form.titolari.forEach(g=>{
            extra+=`<span style="display:inline-block;background:${col};color:#fff;padding:3px 10px;border-radius:12px;font-size:.75rem;margin:2px;font-weight:600">${g}</span>`;
          });
          extra+=`</div></div>`;
        }
      });
      extra+=`</div>`;
    }
  }
  if(userPlan!=="pro"){freeUsed++;localStorage.setItem("freeUsed",freeUsed)}
  const remaining = userPlan==="pro" ? "" : `<p style="color:var(--muted);text-align:center;margin-top:12px;font-size:.85rem">Pronostici gratuiti rimanenti: ${Math.max(0,FREE_LIMIT-freeUsed)}/${FREE_LIMIT}</p>`;
  res.innerHTML=`<div class="card">
    <h2 style="text-align:center">${badge(h,28)}${h} vs ${a}${badge(a,28)}</h2>
    <div style="text-align:center;margin:16px 0;padding:16px;background:linear-gradient(135deg,#0d3b1e,#162447);border-radius:12px;border:2px solid var(--green)">
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:4px">Consiglio MatchIQ</div>
      <span style="font-size:1.8rem;font-weight:800;color:var(--green)">${best}</span>
      <span style="font-size:1.1rem;color:var(--text);margin-left:8px">${d.sugg_label||""}</span>
      ${d.sicura?' <span class="tag" style="background:#ff6b35;color:#fff;font-size:.8rem;padding:4px 12px;margin-left:8px">SICURA</span>':''}
      <div style="margin-top:8px"><span style="color:${cc};font-weight:700">Affidabilita: ${d.confidence_label} (${cp}%)</span></div>
      <div class="bar" style="max-width:250px;margin:6px auto 0"><div class="bar-fill" style="width:${cp}%;background:${cc}"></div></div>
    </div>
    <div class="grid3" style="margin:16px 0">
      <div class="box1x2 ${best==="1"?"best":""}"><div style="color:var(--green);font-weight:700">1 Casa</div><div class="pct">${d.prob_1}%</div><div class="quota">Quota ${d.quota_1}</div></div>
      <div class="box1x2 ${best==="X"?"best":""}"><div style="color:var(--yellow);font-weight:700">X Pareggio</div><div class="pct">${d.prob_x}%</div><div class="quota">Quota ${d.quota_x}</div></div>
      <div class="box1x2 ${best==="2"?"best":""}"><div style="color:var(--red);font-weight:700">2 Ospite</div><div class="pct">${d.prob_2}%</div><div class="quota">Quota ${d.quota_2}</div></div>
    </div>
    ${extra}
    ${remaining}
  </div>`;
}

//  -- CALENDARIO (auto-aggiornato con risultati live)  -  - &euro;
let _calRefreshTimer = null;

async function pageCalendario(){
  if(_calRefreshTimer){clearInterval(_calRefreshTimer);_calRefreshTimer=null}
  const leagueLabel = currentLeague==="premier-league"?"Premier League":"Serie A";
  const calUrl = currentLeague==="serie-a" ? "/api/calendario" : "/api/"+currentLeague+"/calendario";
  const cal=await fetchAPI(calUrl, true);
  if(!cal||!cal.giornate||!cal.giornate.length)return `<div class="container">${leagueTabs()}<div class="card" style="color:var(--red)">Errore caricamento calendario.</div></div>`;

  const gc = cal.giornata_corrente || cal.giornate[0].giornata;
  const gCorrente = cal.giornate.find(x=>x.giornata===gc) || cal.giornate[0];
  const completate = cal.giornate.filter(g=>g.stato==="completata");
  const prossime = cal.giornate.filter(g=>g.stato!=="completata" && g.giornata!==gc);

  let html='<div class="container"><h1>Calendario '+leagueLabel+'</h1>';
  html+=leagueTabs();
  html+=`<p class="sub">${cal.live?'<span style="color:#e74c3c;font-weight:700">LIVE</span> - ':''}Giornata ${gc}${gCorrente.live?' in corso':''}</p>`;
  html+='<div class="grid2" style="grid-template-columns:3fr 2fr">';

  // SINISTRA: giornata corrente con risultati live
  html+='<div>';
  html+=`<div class="card" style="${gCorrente.live?'border-color:#e74c3c;border-width:2px':''}">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2 style="color:${gCorrente.live?'#e74c3c':'var(--green)'}">Giornata ${gc}</h2>
      ${gCorrente.live?'<span style="background:#e74c3c;color:#fff;padding:4px 12px;border-radius:10px;font-size:.75rem;font-weight:700;animation:pulse 1.5s infinite">LIVE</span>':''}
    </div>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:12px">${gCorrente.data||""}</p>`;

  if(userPlan==="pro" && !gCorrente.live && gCorrente.stato!=="completata"){
    html+=`<button class="btn btn-green" style="margin-bottom:12px;font-size:.9rem" onclick="simulaGiornata(${gc})">Simula Pronostici Giornata</button>`;
  }

  gCorrente.partite.forEach(p=>{
    const hasResult = p.gol_h !== null && p.gol_h !== undefined;
    if(hasResult){
      // Partita con risultato (live o finita)
      const colH=p.gol_h>p.gol_a?"var(--green)":p.gol_h<p.gol_a?"var(--red)":"var(--yellow)";
      const colA=p.gol_a>p.gol_h?"var(--green)":p.gol_a<p.gol_h?"var(--red)":"var(--yellow)";
      let statusBadge="";
      if(p.live){statusBadge=`<span style="background:#e74c3c;color:#fff;padding:2px 6px;border-radius:6px;font-size:.65rem;font-weight:700;animation:pulse 1.5s infinite">${p.minuto||""}'</span>`}
      else if(p.status==="FT"){statusBadge='<span style="color:var(--muted);font-size:.65rem">FT</span>'}
      else if(p.status==="HT"){statusBadge='<span style="background:var(--yellow);color:#000;padding:2px 6px;border-radius:6px;font-size:.65rem;font-weight:700">INT</span>'}
      html+=`<div style="display:flex;align-items:center;padding:8px;border-bottom:1px solid #1f3460${p.live?';background:rgba(231,76,60,.08);border-radius:6px':''};cursor:${p.fixture_id?'pointer':'default'}" ${p.fixture_id?`onclick="showFixtureDetail(${p.fixture_id},'${p.home}','${p.away}')"`:''}>
        <span style="flex:1;text-align:right;font-weight:700;font-size:.9rem">${badge(p.home,18)}${p.home}</span>
        <div style="text-align:center;min-width:70px">
          <span style="font-size:1.1rem;font-weight:800"><span style="color:${colH}">${p.gol_h}</span> - <span style="color:${colA}">${p.gol_a}</span></span>
          <div>${statusBadge}</div>
        </div>
        <span style="flex:1;font-weight:700;font-size:.9rem">${p.away}${badge(p.away,18)}</span>
      </div>`;
    } else {
      // Partita da giocare
      html+=`<div class="match-btn" style="cursor:default"><span>${badge(p.home,18)}<strong>${p.home}</strong> <span style="color:var(--muted)">vs</span> <strong>${p.away}</strong>${badge(p.away,18)}</span></div>`;
    }
  });
  html+=`</div><div id="sim-result-main"></div></div>`;

  // DESTRA: archivio + prossime
  html+='<div>';

  // Prossime giornate
  if(prossime.length>0){
    html+='<div class="card" style="padding:8px;margin-bottom:8px"><h4 style="color:var(--muted);margin-bottom:6px">Prossime giornate</h4>';
    prossime.forEach((g,idx)=>{
      const locked=userPlan!=="pro"&&idx>=1;
      html+=`<div style="padding:6px 0;border-bottom:1px solid #1f3460${locked?';opacity:.4':''}"><strong style="color:var(--accent);font-size:.85rem">G.${g.giornata}</strong> <span style="color:var(--muted);font-size:.75rem">${g.data||""}</span>${locked?' <span class="tag tag-red" style="font-size:.6rem">PRO</span>':''}`;
      if(!locked){g.partite.forEach(p=>{html+=`<div style="font-size:.8rem;padding:1px 0;color:var(--text)">${badge(p.home,14)}${p.home} - ${p.away}${badge(p.away,14)}</div>`})}
      html+=`</div>`;
    });
    html+='</div>';
  }

  // Giornate completate (archivio)
  if(completate.length>0){
    html+='<div class="card" style="padding:8px"><h4 style="color:var(--muted);margin-bottom:6px">Archivio risultati</h4>';
    completate.forEach(g=>{
      html+=`<div style="padding:6px 0;border-bottom:1px solid #1f3460"><strong style="color:var(--green);font-size:.85rem">G.${g.giornata}</strong> <span style="color:var(--muted);font-size:.75rem">${g.data||""}</span> <span style="color:var(--green);font-size:.65rem">COMPLETATA</span>`;
      g.partite.forEach(p=>{
        const colH=p.gol_h>p.gol_a?"var(--green)":p.gol_h<p.gol_a?"var(--red)":"var(--yellow)";
        const colA=p.gol_a>p.gol_h?"var(--green)":p.gol_a<p.gol_h?"var(--red)":"var(--yellow)";
        html+=`<div style="font-size:.8rem;padding:1px 0;display:flex;align-items:center">${badge(p.home,12)}<span style="flex:1">${p.home}</span><span style="font-weight:700"><span style="color:${colH}">${p.gol_h}</span>-<span style="color:${colA}">${p.gol_a}</span></span><span style="flex:1;text-align:right">${p.away}</span>${badge(p.away,12)}</div>`;
      });
      html+=`</div>`;
    });
    html+='</div>';
  }

  html+='</div></div>';

  // Auto-refresh se partite live
  if(cal.live){
    html+=`<div style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:8px">Auto-aggiornamento ogni 60 secondi</div>`;
    _calRefreshTimer = setInterval(async()=>{
      if(location.hash!=="#calendario") return;
      const app=$("app");
      const result = await pageCalendario();
      if(result) app.innerHTML = result;
    }, 60000);
  }

  html+='</div>';
  return html;
}

async function simulaGiornata(gNum){
  const det=$("sim-result-main");
  if(!det)return;
  det.innerHTML='<div class="spinner"></div>';
  const cal=await fetchAPI("/api/calendario");
  if(!cal)return;
  const g=cal.giornate.find(x=>x.giornata===gNum);
  if(!g){det.innerHTML='<div class="card">Giornata non trovata</div>';return}
  let html='<div class="card"><h3 style="margin-bottom:12px">Pronostici Giornata '+gNum+'</h3>';
  html+='<div style="overflow-x:auto"><table style="width:100%;font-size:.75rem;white-space:nowrap"><thead><tr><th style="text-align:left">Partita</th><th>1</th><th>X</th><th>2</th><th>Tip</th><th>O/U</th><th>Goal</th><th>Gol</th><th>Aff.</th></tr></thead><tbody>';
  for(const p of g.partite){
    const d=await fetchAPI("/api/pronostico/"+p.home+"/"+p.away);
    if(!d)continue;
    const tipCol=d.suggerimento==="1"?"var(--green)":d.suggerimento==="X"?"var(--yellow)":"var(--red)";
    const ouLbl=d.over_25>50?"Over":"Under";
    const ouVal=d.over_25>50?d.over_25:d.under_25;
    const ouCol=ouVal>60?"var(--green)":ouVal>55?"#8bc34a":"var(--accent)";
    const glLbl=d.goal_si>50?"Si":"No";
    const glVal=d.goal_si>50?d.goal_si:d.goal_no;
    const glCol=glVal>60?"var(--green)":glVal>55?"#8bc34a":"var(--accent)";
    // Colori percentuali 1X2 basati su forza
    function pCol(v){return v>50?"var(--green)":v>35?"var(--yellow)":"var(--red)"}
    html+=`<tr style="border-bottom:1px solid #1f3460;cursor:pointer" onclick="showMatch('${p.home}','${p.away}')">
      <td style="text-align:left;padding:8px 4px"><strong>${p.home}</strong> - <strong>${p.away}</strong></td>
      <td style="color:${pCol(d.prob_1)};font-weight:${d.prob_1>40?'800':'400'}">${d.prob_1}%</td>
      <td style="color:${pCol(d.prob_x)};font-weight:${d.prob_x>30?'800':'400'}">${d.prob_x}%</td>
      <td style="color:${pCol(d.prob_2)};font-weight:${d.prob_2>40?'800':'400'}">${d.prob_2}%</td>
      <td><span style="color:${tipCol};font-weight:800">${d.suggerimento}</span>${d.sicura?'<span style="background:#ff6b35;color:#fff;font-size:.6rem;padding:1px 4px;border-radius:4px;margin-left:2px">!</span>':''}</td>
      <td><span style="color:${ouCol}">${ouLbl} ${ouVal}%</span></td>

async function loadSq(nome){
  const det=$("sq-det"); if(!det)return;
  det.innerHTML='<div class="spinner"></div>';
  const d=await fetchAPI("/api/squadra/"+encodeURIComponent(nome));
  if(!d){det.innerHTML='<div class="card" style="color:var(--red)">Errore</div>';return}
  let html='<div class="grid2">';
  // Sinistra: info + formazione campo
  html+='<div>';
  html+=`<div class="card"><h2>${badge(d.nome||nome,28)}${d.nome||nome}</h2><p style="color:var(--muted)">Allenatore: <strong>${d.allenatore||"N/D"}</strong></p>${d.ultimo_aggiornamento?`<p style="color:var(--muted);font-size:.8rem;margin-top:4px">Aggiornamento: ${d.ultimo_aggiornamento}</p>`:''}</div>`;
  if(d.formazione&&d.formazione.titolari){
    const tit=d.formazione.titolari;
    const mod=d.formazione.modulo||"4-4-2";
    const modNums=(mod.match(/\d/g)||[]).map(Number);
    // Righe dal portiere (basso) all'attacco (alto): [1, def, cen..., att]
    const rows=[[1]];
    modNums.forEach(n=>rows.push([n]));
    // Ruoli: prima riga=P, ultima=A, mezzo=D poi C
    const nRows=rows.length;
    function getRuolo(ri){
      if(ri===0) return "P";
      if(ri===nRows-1) return "A";
      if(ri===1) return "D";
      return "C";
    }
    const ruoliCol={"P":"#f39c12","D":"#3498db","C":"#2ecc71","A":"#e74c3c"};
    const ruoliLbl={"P":"POR","D":"DIF","C":"CC","A":"ATT"};

    // Costruisci righe dall'attacco (alto) al portiere (basso)
    let pitchRows=[];
    let idx=0;
    rows.forEach((row,ri)=>{
      let cells=[];
      for(let c=0;c<row[0];c++){
        if(idx<tit.length){
          const nome=tit[idx];
          const cognome=nome.split(" ").pop();
          const ruolo=getRuolo(ri);
          cells.push({cognome, ruolo});
          idx++;
        }
      }
      pitchRows.push(cells);
    });

    // Inverti: attacco in alto, portiere in basso
    pitchRows.reverse();

    let pitchHtml='';
    pitchRows.forEach(cells=>{
      pitchHtml+=`<div style="display:flex;justify-content:center;gap:12px;margin:8px 0">`;
      cells.forEach(c=>{
        const col=ruoliCol[c.ruolo]||"#3498db";
        const lbl=ruoliLbl[c.ruolo]||"";
        pitchHtml+=`<div style="text-align:center;min-width:55px"><div style="background:${col};color:#fff;width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;border:2px solid rgba(255,255,255,.4)">${lbl}</div><div style="color:#fff;font-size:.65rem;font-weight:600;margin-top:2px;text-shadow:0 1px 2px rgba(0,0,0,.5)">${c.cognome}</div></div>`;
      });
      pitchHtml+='</div>';
    });

    html+=`<div class="card"><h3>Probabile Formazione (${mod})</h3>
      <div class="pitch" style="margin-top:8px;padding:20px 12px;min-height:320px;display:flex;flex-direction:column;justify-content:space-between">
        ${pitchHtml}
      </div>
    </div>`;
  }
  if(d.infortunati&&d.infortunati.length>0){
    html+=`<div class="card" style="border-color:var(--red)"><h3 style="color:var(--red)">&#127973; Indisponibili (${d.infortunati.length})</h3>`;
    d.infortunati.forEach(inj=>{
      const c=inj.tipo==="infortunio"?"var(--red)":"var(--yellow)";
      html+=`<div style="padding:6px 0;border-bottom:1px solid #1f3460"><span style="color:${c};font-weight:700">${inj.tipo==="infortunio"?"X":"?"} ${inj.nome}</span><br><span style="color:var(--muted);font-size:.85rem">${inj.dettaglio||""}</span></div>`;
    });
    html+='</div>';
  }
  html+='</div>';
  // Destra: rosa per ruolo
  html+='<div>';
  if(d.rosa){
    const ruoli={P:{n:"Portieri",c:"var(--yellow)"},D:{n:"Difensori",c:"var(--accent)"},C:{n:"Centrocampisti",c:"var(--green)"},A:{n:"Attaccanti",c:"var(--red)"}};
    for(const[r,info]of Object.entries(ruoli)){
      const gg=d.rosa.filter(g=>g.ruolo===r);
      if(!gg.length)continue;
      html+=`<div class="card" style="padding:12px"><h3 style="color:${info.c}">${info.n}</h3>`;
      gg.forEach(g=>{
        const ini=(g.nome||"").split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
        html+=`<div style="display:flex;align-items:center;padding:4px 0;border-bottom:1px solid #1f3460"><div style="width:28px;height:28px;border-radius:50%;background:${info.c};display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff;margin-right:6px;flex-shrink:0">${ini}</div><span style="width:26px;font-weight:700;color:${info.c};font-size:.8rem">${g.numero}</span><span style="font-size:.85rem">${g.nome}</span></div>`;
      });
      html+='</div>';
    }
  }
  html+='</div></div>';
  det.innerHTML=html;
}

      } else if(p.status==="FT"||p.status==="AET"){
        statusBadge = `<span style="color:var(--muted);font-size:.7rem">FT</span>`;
      } else if(p.status==="HT"){
        statusBadge = `<span style="background:var(--yellow);color:#000;padding:2px 8px;border-radius:8px;font-size:.7rem;font-weight:700">Intervallo</span>`;
      } else {
        statusBadge = `<span style="color:var(--muted);font-size:.7rem">${statusIt}</span>`;
      }
      // Marcatori separati per squadra
      const mH = p.marcatori_home || [];
      const mA = p.marcatori_away || [];
      const hasMarcatori = mH.length > 0 || mA.length > 0 || (p.marcatori && p.marcatori.length > 0);
      // Statistiche
      const st = p.stats || {};
      const hasStats = st.possesso_home || st.tiri_home;

      html+=`<div style="padding:10px 8px;border-bottom:1px solid #1f3460${isLive?';background:rgba(231,76,60,.08);border-radius:8px;margin:3px 0':''};cursor:pointer;transition:.2s" onclick="showFixtureDetail(${p.fixture_id||0},'${p.home}','${p.away}')" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='#1f3460'">
        <div style="display:flex;align-items:center;justify-content:center;gap:4px">
          <span style="flex:1;text-align:right;font-weight:700;font-size:.95rem">${badge(p.home,22)}${p.home}</span>
          <div style="text-align:center;min-width:80px">
            <span style="font-size:${isLive?'1.6rem':'1.3rem'};font-weight:800"><span style="color:${colH}">${p.gol_h}</span> - <span style="color:${colA}">${p.gol_a}</span></span>
            <div>${statusBadge}</div>
          </div>
          <span style="flex:1;font-weight:700;font-size:.95rem">${p.away}${badge(p.away,22)}</span>
        </div>`;

      // Marcatori per squadra (sinistra casa, destra ospite)
      if(hasMarcatori){
        if(mH.length || mA.length){
          html+=`<div style="display:flex;justify-content:center;gap:16px;margin-top:6px;font-size:.75rem">
            <div style="flex:1;text-align:right;color:var(--muted)">${mH.map(m=>'&#9917; '+m).join('<br>')}</div>
            <div style="width:1px;background:#1f3460"></div>
            <div style="flex:1;text-align:left;color:var(--muted)">${mA.map(m=>'&#9917; '+m).join('<br>')}</div>
          </div>`;
        } else if(p.marcatori && p.marcatori.length){
          html+=`<div style="text-align:center;color:var(--muted);font-size:.75rem;margin-top:4px">${p.marcatori.map(m=>'&#9917; '+m).join(' &nbsp; ')}</div>`;
        }
      }

      // Cartellini
      if((p.rossi_home&&p.rossi_home.length)||(p.rossi_away&&p.rossi_away.length)){
        html+=`<div style="text-align:center;font-size:.7rem;margin-top:3px;color:#e74c3c">${[...(p.rossi_home||[]),...(p.rossi_away||[])].map(r=>'&#128997; '+r).join(' &nbsp; ')}</div>`;
      }

      // Statistiche partita (solo se disponibili)
      if(hasStats){
        html+=`<div style="margin-top:8px;padding:8px;background:#0d1b2a;border-radius:8px;font-size:.75rem">
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:4px;align-items:center;text-align:center">`;
        // Possesso
        if(st.possesso_home){
          const pH=parseInt(st.possesso_home)||50;
          const pA=parseInt(st.possesso_away)||50;
          html+=`<span style="text-align:right;color:${pH>pA?'var(--green)':'var(--muted)'};font-weight:${pH>pA?'700':'400'}">${st.possesso_home}</span>
            <span style="color:var(--muted);font-size:.65rem">Possesso</span>
            <span style="text-align:left;color:${pA>pH?'var(--green)':'var(--muted)'};font-weight:${pA>pH?'700':'400'}">${st.possesso_away}</span>`;
        }
        // Tiri in porta
        if(st.tiri_porta_home!=null){
          html+=`<span style="text-align:right;color:var(--text)">${st.tiri_porta_home}</span>
            <span style="color:var(--muted);font-size:.65rem">Tiri in porta</span>
            <span style="text-align:left;color:var(--text)">${st.tiri_porta_away||0}</span>`;
        }
        // Tiri totali
        if(st.tiri_home!=null){
          html+=`<span style="text-align:right;color:var(--text)">${st.tiri_home}</span>
            <span style="color:var(--muted);font-size:.65rem">Tiri totali</span>
            <span style="text-align:left;color:var(--text)">${st.tiri_away||0}</span>`;
        }
        // Corner
        if(st.corner_home!=null){
          html+=`<span style="text-align:right;color:var(--text)">${st.corner_home}</span>
            <span style="color:var(--muted);font-size:.65rem">Corner</span>
            <span style="text-align:left;color:var(--text)">${st.corner_away||0}</span>`;
        }
        // Falli
        if(st.falli_home!=null){
          html+=`<span style="text-align:right;color:var(--text)">${st.falli_home}</span>
            <span style="color:var(--muted);font-size:.65rem">Falli</span>
            <span style="text-align:left;color:var(--text)">${st.falli_away||0}</span>`;
        }
        // Fuorigioco
        if(st.fuorigioco_home!=null){
          html+=`<span style="text-align:right;color:var(--text)">${st.fuorigioco_home}</span>
            <span style="color:var(--muted);font-size:.65rem">Fuorigioco</span>
            <span style="text-align:left;color:var(--text)">${st.fuorigioco_away||0}</span>`;
        }
        html+=`</div></div>`;
      }
      html+=`</div>`;
    });
    html+='</div>';
  });
  html+='<div id="live-refresh-info" style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:8px"></div>';
  html+='</div>';

  // Auto-refresh ogni 60 secondi se ci sono partite live
  if(hasLive){
    _liveRefreshTimer = setInterval(()=>{refreshRisultati()}, 60000);
    setTimeout(()=>{
      const info=$("live-refresh-info");
      if(info) info.innerHTML="Auto-aggiornamento ogni 60 secondi durante le partite live";
    },300);
  }
  return html;
}

async function refreshRisultati(){
  const app=$("app");
  if(!app || !location.hash.includes("risultati") || _viewingFixtureDetail) return;
  const result = await pageRisultati();
  if(result) app.innerHTML = result;
}

async function backToRisultati(){
  _viewingFixtureDetail = false;
  const app=$("app");
  app.innerHTML='<div class="spinner"></div>';
  const result = await pageRisultati();
  if(result) app.innerHTML = result;
}

async function showFixtureDetail(fixtureId, home, away){
  if(!fixtureId) return;
  _viewingFixtureDetail = true;
  const app=$("app");
  app.innerHTML='<div class="container"><div class="spinner"></div><p style="text-align:center;color:var(--muted);margin-top:12px">Caricamento dettagli partita...</p></div>';

  const d = await fetchAPI("/api/fixture/"+fixtureId, true);
  if(!d || !d.home){
    app.innerHTML='<div class="container"><div class="card" style="color:var(--red)">Errore caricamento dettagli. <a href="#risultati" style="color:var(--accent)">Torna</a></div></div>';
    return;
  }

  const colH=d.gol_h>d.gol_a?"var(--green)":d.gol_h<d.gol_a?"var(--red)":"var(--yellow)";
  const colA=d.gol_a>d.gol_h?"var(--green)":d.gol_a<d.gol_h?"var(--red)":"var(--yellow)";
  const isLive=d.live;
  const st=d.stats||{};
  const ev=d.eventi||[];
  const fm=d.formazioni||{};

  let html='<div class="container">';
  html+=`<a href="javascript:void(0)" onclick="backToRisultati()" style="color:var(--accent);display:inline-block;margin-bottom:12px">&larr; Torna ai Risultati</a>`;

  // Header partita
  html+=`<div class="card" style="text-align:center;padding:24px${isLive?';border-color:#e74c3c;border-width:2px':''}">
    ${isLive?'<div style="margin-bottom:8px"><span style="background:#e74c3c;color:#fff;padding:4px 16px;border-radius:12px;font-weight:700;animation:pulse 1.5s infinite">LIVE '+(d.minuto||"")+"'"+'</span></div>':''}
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin:12px 0">
      <div style="flex:1;text-align:right"><h2 style="margin:0;font-size:1.4rem">${badge(d.home,32)}${d.home}</h2></div>
      <div style="text-align:center">
        <span style="font-size:2.5rem;font-weight:800"><span style="color:${colH}">${d.gol_h}</span> - <span style="color:${colA}">${d.gol_a}</span></span>
        <div style="color:var(--muted);font-size:.8rem;margin-top:4px">${d.status_it||d.status}${d.primo_tempo?' | 1T: '+d.primo_tempo:''}</div>
      </div>
      <div style="flex:1"><h2 style="margin:0;font-size:1.4rem">${d.away}${badge(d.away,32)}</h2></div>
    </div>
    ${d.stadio?'<div style="color:var(--muted);font-size:.8rem">'+d.stadio+(d.citta?' - '+d.citta:'')+(d.arbitro?' | Arbitro: '+d.arbitro:'')+'</div>':''}
  </div>`;

  // EVENTI (cronologia partita)
  if(ev.length>0){
    html+=`<div class="card"><h3 style="margin-bottom:12px">Cronologia</h3>`;
    ev.forEach(e=>{
      const isHome=e.squadra==="home";
      let icon="", color="var(--text)";
      if(e.tipo==="Goal"){icon="&#9917;";color="var(--green)"}
      else if(e.tipo==="Card"&&e.dettaglio==="Yellow Card"){icon="&#128993;";color="var(--yellow)"}
      else if(e.tipo==="Card"&&e.dettaglio==="Red Card"){icon="&#128308;";color="var(--red)"}
      else if(e.tipo==="subst"){icon="&#128260;";color="var(--accent)"}
      else if(e.tipo==="Var"){icon="&#128250;";color="var(--muted)"}
      else{icon="&#128204;"}

      html+=`<div style="display:flex;align-items:center;padding:4px 0;border-bottom:1px solid #1f3460;font-size:.85rem">
        <span style="width:40px;text-align:center;color:var(--muted);font-weight:700;font-size:.75rem">${e.minuto}</span>
        <span style="width:24px;text-align:center">${icon}</span>
        <div style="flex:1;${isHome?'text-align:left':'text-align:right'};color:${color}">
          <strong>${e.giocatore}</strong>${e.dettaglio==="Penalty"?' (R)':e.dettaglio==="Own Goal"?' (aut.)':''}
          ${e.assist?'<span style="color:var(--muted);font-size:.75rem"> assist '+e.assist+'</span>':''}
          ${e.tipo==="subst"?'<span style="color:var(--muted);font-size:.75rem"> &larr; '+e.assist+'</span>':''}
        </div>
        <span style="width:50px;text-align:center;font-size:.7rem;color:var(--muted)">${isHome?d.home:d.away}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  // STATISTICHE (layout professionale)
  if(Object.keys(st).length>0){
    html+=`<div class="card"><h3 style="margin-bottom:16px">Statistiche</h3>
    <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding:0 8px">
      <span style="font-weight:700;color:var(--green)">${badge(d.home,20)}${d.home}</span>
      <span style="font-weight:700;color:var(--red)">${d.away}${badge(d.away,20)}</span>
    </div>`;

    const statRows=[
      ["possesso","Possesso"],["tiri_porta","Tiri in porta"],["tiri","Tiri totali"],
      ["tiri_fuori","Tiri fuori"],["tiri_bloccati","Tiri bloccati"],
      ["corner","Corner"],["falli","Falli"],["fuorigioco","Fuorigioco"],
      ["gialli","Gialli"],["rossi","Rossi"],["parate","Parate"],
      ["passaggi","Passaggi"],["passaggi_riusciti","Passaggi riusciti"],
      ["passaggi_pct","Precisione pass."],["xg","xG"]
    ];

    statRows.forEach(([key,label])=>{
      const vh=st[key+"_home"], va=st[key+"_away"];
      if(vh==null&&va==null) return;
      const isNum = typeof vh === 'number' || (typeof vh === 'string' && !vh.includes('%'));
      const numH=parseFloat(vh)||0, numA=parseFloat(va)||0;
      const total=numH+numA||1;
      const pctH=key==="possesso"?(parseInt(vh)||50):Math.round(numH/total*100);
      const pctA=key==="possesso"?(parseInt(va)||50):Math.round(numA/total*100);
      const betterH=numH>numA, betterA=numA>numH;

      html+=`<div style="padding:8px;border-bottom:1px solid rgba(31,52,96,.5)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:.95rem;font-weight:${betterH?'800':'400'};color:${betterH?'var(--green)':'var(--text)'};min-width:50px">${vh!=null?vh:'-'}</span>
          <span style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${label}</span>
          <span style="font-size:.95rem;font-weight:${betterA?'800':'400'};color:${betterA?'var(--green)':'var(--text)'};min-width:50px;text-align:right">${va!=null?va:'-'}</span>
        </div>
        <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;gap:2px">
          <div style="width:${pctH}%;background:${betterH?'var(--green)':'#2a3f5f'};border-radius:3px;transition:width .5s"></div>
          <div style="width:${pctA}%;background:${betterA?'var(--red)':'#2a3f5f'};border-radius:3px;transition:width .5s"></div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // FORMAZIONI
  if(fm.home||fm.away){
    html+=`<div class="card"><h3 style="margin-bottom:12px">Formazioni</h3><div class="grid2">`;
    ["home","away"].forEach(side=>{
      const f=fm[side];
      if(!f) return;
      const nome=side==="home"?d.home:d.away;
      const col=side==="home"?"var(--green)":"var(--red)";
      html+=`<div>
        <h4 style="color:${col};margin-bottom:6px">${nome} (${f.modulo})</h4>
        <p style="color:var(--muted);font-size:.75rem;margin-bottom:8px">All. ${f.allenatore}</p>
        <div style="background:#2d8a4e;border-radius:8px;padding:10px;text-align:center;margin-bottom:8px">
          ${f.titolari.map(g=>'<span style="display:inline-block;background:'+col+';color:#fff;padding:2px 8px;border-radius:10px;font-size:.7rem;margin:2px;font-weight:600">'+g+'</span>').join('')}
        </div>
        ${f.panchina&&f.panchina.length?'<p style="color:var(--muted);font-size:.7rem">Panchina: '+f.panchina.join(', ')+'</p>':''}
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Auto-refresh se live (solo se ancora sulla pagina risultati)
  if(isLive){
    html+=`<div style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:8px">Aggiornamento automatico ogni 30 secondi</div>`;
    setTimeout(()=>{
      if(location.hash==="#risultati") showFixtureDetail(fixtureId,home,away);
    }, 30000);
  }

  html+='</div>';
  app.innerHTML=html;
}

function showLoginTab(tab){
  $("login-form").style.display = tab==="login"?"block":"none";
  $("reg-form").style.display = tab==="reg"?"block":"none";
  $("recover-form").style.display = tab==="recover"?"block":"none";
  $("tab-login").style.background = tab==="login"?"var(--accent)":"#1f3460";
  $("tab-login").style.color = tab==="login"?"#fff":"var(--muted)";
  $("tab-reg").style.background = tab==="reg"?"var(--accent)":"#1f3460";
  $("tab-reg").style.color = tab==="reg"?"#fff":"var(--muted)";
  if($("auth-msg")) $("auth-msg").innerHTML = "";
}

function togglePass(id, btn){
  const inp = $(id);
  if(inp.type==="password"){inp.type="text";btn.textContent="Nascondi"}
  else{inp.type="password";btn.textContent="Mostra"}
}

async function doRecover(){
  const email=$("recover-email").value, msg=$("auth-msg");
  if(!email){msg.innerHTML='<span style="color:var(--red)">Inserisci la tua email</span>';return}
  msg.innerHTML='<div class="spinner" style="margin:8px auto"></div>';
  try{
    const d=await postAPI("/api/auth/reset-password",{email});
    msg.innerHTML='<span style="color:var(--green)">Nuova password generata! Controlla qui sotto.</span><br><div class="card" style="margin-top:12px;padding:16px;text-align:center"><p style="color:var(--muted)">La tua nuova password e\':</p><p style="font-size:1.3rem;font-weight:800;color:var(--green);margin:8px 0;letter-spacing:2px">' + d.new_password + '</p><p style="color:var(--muted);font-size:.85rem">Usala per accedere, poi cambiala dal tuo account.</p></div>';
  }catch(e){msg.innerHTML=`<span style="color:var(--red)">${e.message}</span>`}
}

async function doLogin(){
  const email=$("login-email").value, pass=$("login-pass").value, msg=$("auth-msg");
  if(!email||!pass){msg.innerHTML='<span style="color:var(--red)">Compila tutti i campi</span>';return}
  msg.innerHTML='<div class="spinner" style="margin:8px auto"></div>';
  try{
    const d=await postAPI("/api/auth/login",{email,password:pass});
    userToken=d.access_token; userPlan=d.piano||"free"; userEmail=email;
    localStorage.setItem("userToken",userToken);
    localStorage.setItem("userPlan",userPlan);
    localStorage.setItem("userEmail",userEmail);
    updateNavAuth();
    location.hash="#home";
  }catch(e){msg.innerHTML=`<span style="color:var(--red)">${e.message}</span>`}
}

async function doRegister(){
  const email=$("reg-email").value, pass=$("reg-pass").value, msg=$("auth-msg");
  if(!email||pass.length<6){msg.innerHTML='<span style="color:var(--red)">Email e password (min 6 car.) richiesti</span>';return}
  msg.innerHTML='<div class="spinner" style="margin:8px auto"></div>';
  try{
    const d=await postAPI("/api/auth/register",{email,password:pass});
    userToken=d.access_token; userPlan=d.piano||"free"; userEmail=email;
    localStorage.setItem("userToken",userToken);
    localStorage.setItem("userPlan",userPlan);
    localStorage.setItem("userEmail",userEmail);
    updateNavAuth();
    location.hash="#home";
  }catch(e){msg.innerHTML=`<span style="color:var(--red)">${e.message}</span>`}
}

function doLogout(){
  userToken=""; userPlan="free"; userEmail=""; freeUsed=0;
  localStorage.removeItem("userToken");
  localStorage.removeItem("userPlan");
  localStorage.removeItem("userEmail");
  localStorage.setItem("freeUsed","0");
  updateNavAuth();
  location.hash="#home";
}

function updateNavAuth(){
  const el=$("nav-auth");
  if(!el)return;
  if(userToken){
    el.innerHTML=userPlan==="pro"?"&#11088; Pro":"&#128100; Free";
    el.style.background=userPlan==="pro"?"var(--green)":"#1f3460";
    el.style.color=userPlan==="pro"?"#000":"var(--text)";
  }else{
    el.innerHTML="&#128100; Accedi";
    el.style.background="#1f3460";
    el.style.color="var(--muted)";
  }
}

//  -- STRIPE CHECKOUT  -  - &euro;
async function abbonarPro(){
  const btn = event.target;
  btn.textContent = "Caricamento...";
  btn.disabled = true;
  try {
    const ep = userEmail ? `/api/payments/checkout-direct?email=${encodeURIComponent(userEmail)}` : "/api/payments/checkout-direct";
    const d = await fetchAPI(ep);
    if(d && d.checkout_url){
      window.location.href = d.checkout_url;
    } else {
      alert("Errore nella creazione del pagamento. Riprova.");
      btn.textContent = "Abbonati Ora";
      btn.disabled = false;
    }
  } catch(e) {
    alert("Errore connessione. Riprova.");
    btn.textContent = "Abbonati Ora";
    btn.disabled = false;
  }
}

// ROUTER
const routes={home:pageHome,pronostici:pagePronostici,calendario:pageCalendario,classifica:pageClassifica,squadre:pageSquadre,notizie:pageNotizie,risultati:pageRisultati,pricing:pagePricing,login:pageLogin};

async function navigate(){
  const hash=(location.hash||"#home").replace("#","");
  // Pulisci stato quando si cambia pagina
  if(hash!=="risultati" && _liveRefreshTimer){clearInterval(_liveRefreshTimer);_liveRefreshTimer=null}
  if(hash!=="calendario" && _calRefreshTimer){clearInterval(_calRefreshTimer);_calRefreshTimer=null}
  _viewingFixtureDetail = false;
  const page=routes[hash]||routes.home;
  document.querySelectorAll(".nav a:not(#nav-auth)").forEach(a=>a.classList.toggle("active",a.getAttribute("href")==="#"+hash));
  const app=$("app");
  try{
    const result=page();
    if(result&&typeof result.then==="function"){app.innerHTML='<div class="spinner"></div>';app.innerHTML=await result}
    else{app.innerHTML=result}
  }catch(e){app.innerHTML='<div class="container card" style="color:var(--red)">Errore: '+e.message+'</div>'}
  if(hash==="squadre"&&userPlan==="pro")setTimeout(()=>loadSq("Inter"),200);
  if(hash==="home"){
    setTimeout(()=>loadPartiteOggi(),500);
    setTimeout(()=>loadSchedina(),2000);
    setTimeout(()=>{fetchAPI("/api/classifica")},5000);
  }
  updateNavAuth();
}

//  -- GESTIONE RITORNO DA STRIPE  -  - &euro;
async function checkPaidReturn(){
  if(window.location.search.includes("paid=1")){
    // L'utente torna da Stripe dopo il pagamento
    if(userToken && userEmail){
      // Attiva Pro nel backend
      try{
        await postAPI("/api/payments/activate-pro", {email: userEmail});
      }catch(e){}
      userPlan = "pro";
      localStorage.setItem("userPlan","pro");
      freeUsed = 0;
      localStorage.setItem("freeUsed","0");
      updateNavAuth();
      // Pulisci URL
      history.replaceState(null,"","/app#home");
      alert("Pagamento completato! Ora hai accesso Pro illimitato.");
    } else {
      // Non loggato: salva che ha pagato
      localStorage.setItem("stripe_paid","1");
      history.replaceState(null,"","/app#login");
      location.hash = "#login";
      alert("Pagamento ricevuto! Accedi con la tua email per attivare il piano Pro.");
    }
  }
  // Se ha pagato ma non era loggato, attiva dopo login
  if(localStorage.getItem("stripe_paid")==="1" && userToken && userEmail){
    try{
      const r = await postAPI("/api/payments/activate-pro", {email: userEmail});
      if(r.piano==="pro"){
        userPlan = "pro";
        localStorage.setItem("userPlan","pro");
        localStorage.removeItem("stripe_paid");
        updateNavAuth();
      }
    }catch(e){}
  }
}

window.addEventListener("hashchange",navigate);
if(!location.hash)location.hash="#home";
// Avvia navigazione senza attendere checkPaidReturn
navigate();
checkPaidReturn();

// PWA Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
